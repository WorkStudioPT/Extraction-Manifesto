<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extraction Manifesto — Runners Season</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Stencil:wght@700;800&family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#cdbfa0;
    --paper-dark:#bdad88;
    --card:#e4d9bd;
    --ink:#2a271f;
    --ink-soft:#5a5342;
    --line:#a3936c;
    --tape:#e7b93f;
    --stamp:#8c2b23;
    --rare:#2f6f76;
    --epic:#5b3a86;
    --legendary:#a8681f;
    --mythic:#8c1f2b;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      repeating-linear-gradient(135deg, rgba(0,0,0,0.025) 0 2px, transparent 2px 6px),
      radial-gradient(ellipse 900px 500px at 90% -10%, rgba(140,43,35,0.06), transparent),
      var(--paper);
    color:var(--ink);
    font-family:'Rajdhani',sans-serif;
    min-height:100vh;
    padding:36px 20px 90px;
  }
  .wrap{max-width:1600px;margin:0 auto;}

  /* HEADER */
  .manifest-head{
    border:2px solid var(--ink);
    background:var(--card);
    padding:20px 24px;
    position:relative;
    box-shadow:5px 5px 0 rgba(42,39,31,.18);
  }
  .manifest-head::before{
    content:"CH.7 · TEMP.3";
    position:absolute;top:-13px;left:22px;
    background:var(--tape);
    color:var(--ink);
    font-family:'JetBrains Mono';font-weight:700;font-size:11px;letter-spacing:.08em;
    padding:3px 10px;transform:rotate(-2deg);
    border:1px solid var(--ink);
  }
  h1{
    font-family:'Big Shoulders Stencil',sans-serif;
    font-weight:800;
    font-size:clamp(32px,6vw,52px);
    margin:6px 0 2px;letter-spacing:.01em;line-height:.95;
    text-transform:uppercase;
  }
  .sub{color:var(--ink-soft);font-size:15px;margin:0;font-weight:600;}
  .manifest-meta{
    display:flex;gap:18px;margin-top:14px;flex-wrap:wrap;
    font-family:'JetBrains Mono';font-size:11px;color:var(--ink-soft);
  }
  .manifest-meta b{color:var(--ink);}

  /* PROGRESS TRACK */
  .track-card{
    border:2px solid var(--ink);background:var(--card);
    padding:18px 22px;margin-top:16px;
    box-shadow:5px 5px 0 rgba(42,39,31,.18);
  }
  .track-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px;}
  .track-count{font-family:'Big Shoulders Stencil';font-size:26px;color:var(--stamp);}
  .track-count span{color:var(--ink-soft);font-size:15px;font-family:'JetBrains Mono';font-weight:500;}
  .track-pct{font-family:'JetBrains Mono';font-size:13px;color:var(--ink-soft);}
  .track{position:relative;height:34px;}
  .track-line{position:absolute;left:0;right:0;top:50%;height:3px;background:var(--line);transform:translateY(-50%);}
  .track-dots{position:absolute;left:0;right:0;top:0;bottom:0;display:flex;justify-content:space-between;align-items:center;}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--card);border:2px solid var(--line);flex-shrink:0;}
  .dot.filled{background:var(--stamp);border-color:var(--stamp);}

  /* CONTROLS */
  .controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:20px 0 16px;}
  input[type=text]{
    flex:1;min-width:180px;
    background:var(--card);border:2px solid var(--ink);color:var(--ink);
    padding:9px 14px;font-size:14px;font-family:'Rajdhani';font-weight:600;
  }
  input[type=text]:focus{outline:none;border-color:var(--stamp);}
  .pill{
    background:var(--card);border:2px solid var(--ink);color:var(--ink-soft);
    padding:8px 13px;font-size:12.5px;cursor:pointer;
    font-family:'JetBrains Mono';font-weight:700;text-transform:uppercase;letter-spacing:.03em;
    white-space:nowrap;transition:.1s;
  }
  .pill.active{color:var(--card);background:var(--ink);}
  .pill:hover:not(.active){border-color:var(--stamp);}
  .actions{display:flex;gap:8px;margin-left:auto;}
  .iconbtn{
    background:var(--ink);border:2px solid var(--ink);color:var(--card);
    padding:8px 12px;font-size:11px;cursor:pointer;font-family:'JetBrains Mono';font-weight:700;
    text-transform:uppercase;
  }
  .iconbtn:hover{background:var(--stamp);border-color:var(--stamp);}

  /* GRID */
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(920px,1fr));gap:14px;}
  @media (max-width:1100px){
    .grid{grid-template-columns:1fr;}
  }
  .card{
    background:var(--card);border:2px solid var(--ink);
    padding:16px;position:relative;overflow:hidden;
    box-shadow:4px 4px 0 rgba(42,39,31,.16);
    display:flex;gap:18px;align-items:flex-start;
  }
  .card::before{
    content:"";position:absolute;top:14px;left:-7px;width:14px;height:14px;
    border-radius:50%;background:var(--paper);border:2px solid var(--ink);
  }
  .card.hidden{display:none;}
  .card-main{flex:1;min-width:0;}
  .card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:8px;padding-left:8px;}
  .icon{
    width:92px;height:92px;flex-shrink:0;object-fit:cover;
    background:var(--paper);border:2px solid var(--line);border-radius:6px;
  }
  .card-name{font-family:'Big Shoulders Stencil';font-weight:800;font-size:19px;text-transform:uppercase;letter-spacing:.02em;}
  .rarity-tag{
    font-family:'JetBrains Mono';font-size:10px;letter-spacing:.06em;text-transform:uppercase;
    padding:3px 7px;font-weight:700;flex-shrink:0;color:#fff;
  }
  .rarity-tag.rare{background:var(--rare);}
  .rarity-tag.epic{background:var(--epic);}
  .rarity-tag.legendary{background:var(--legendary);}
  .rarity-tag.mythic{background:var(--mythic);}
  .ability{color:var(--ink-soft);font-size:13px;line-height:1.4;margin-bottom:14px;min-height:34px;padding-left:8px;font-weight:600;}
  
  .variants{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;padding-left:8px;}
  
  /* CHIP & INDIVIDUAL CONTROLS */
  .chip{
    text-align:center;
    border:2px solid var(--line);background:var(--paper);color:var(--ink-soft);
    font-family:'JetBrains Mono';font-size:10.5px;font-weight:700;text-transform:uppercase;
    padding:4px 4px 6px;cursor:pointer;user-select:none;transition:.1s;
    display:flex;flex-direction:column;justify-content:space-between;
  }
  .chip:hover{border-color:var(--ink);}
  .chip.on{background:var(--ink);color:var(--card);border-color:var(--ink);}
  
  .chip-thumb{
    width:100%;height:102px;object-fit:contain;display:block;margin-bottom:4px;
    background:rgba(255,255,255,.25);border-radius:4px;
  }
  .chip.unreleased{opacity:.55; border-style: dashed;}
  .chip-badge{
    display:block;font-size:8.5px;letter-spacing:.05em;color:var(--stamp);margin-top:2px;
  }

  .chip-controls {
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px dashed var(--line);
    display: flex;
    flex-direction: column;
    gap: 4px;
    text-align: left;
    font-size: 9px;
  }
  .chip.on .chip-controls {
    border-top-color: var(--ink-soft);
  }
  .chip-controls label {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 2px;
    cursor: pointer;
  }
  .chip-controls select {
    background: var(--card);
    border: 1px solid var(--line);
    color: var(--ink);
    font-family: 'JetBrains Mono';
    font-size: 9px;
    font-weight: 700;
    padding: 0px 2px;
    outline: none;
  }
  .chip.on .chip-controls select {
    background: var(--paper);
    border-color: var(--ink-soft);
  }
  .chip-controls input[type="checkbox"] {
    appearance: none;
    width: 11px;
    height: 11px;
    border: 1px solid var(--ink);
    background: var(--card);
    cursor: pointer;
    position: relative;
    margin: 0;
  }
  .chip.on .chip-controls input[type="checkbox"] {
    border-color: var(--card);
    background: var(--paper);
  }
  .chip-controls input[type="checkbox"]:checked {
    background: var(--stamp);
    border-color: var(--stamp);
  }
  .chip-controls input[type="checkbox"]:checked::after {
    content: "✓";
    position: absolute;
    color: white;
    font-size: 9px;
    font-weight: bold;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  .stamp-overlay{
    position:absolute;top:38%;left:50%;
    transform:translate(-50%,-50%) rotate(-16deg);
    border:4px solid var(--stamp);color:var(--stamp);
    font-family:'Big Shoulders Stencil';font-weight:800;font-size:22px;
    padding:2px 14px;letter-spacing:.08em;text-transform:uppercase;
    opacity:0.88;pointer-events:none;
    mix-blend-mode:multiply;
  }

  footer{text-align:center;color:var(--ink-soft);font-size:12px;margin-top:40px;font-family:'JetBrains Mono';}

  @media (max-width:480px){
    body{padding:20px 12px 70px;}
    .card{flex-direction:column;}
    .icon{width:100%;height:160px;}
    .variants{grid-template-columns:repeat(2,1fr);}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="manifest-head">
    <h1>Extraction Manifesto</h1>
    <p class="sub">Track every sprite and variant extracted — data stays stored on this device.</p>
    <div class="manifest-meta">
      <div>SEASON: <b>Runners</b></div>
      <div>UPDATED: <b>25 JUN 2026</b></div>
      <div>ENTRIES: <b id="totalMeta">—</b></div>
    </div>
  </div>

  <div class="track-card">
    <div class="track-top">
      <div class="track-count" id="countText">0<span> / 0</span></div>
      <div class="track-pct" id="pctText">0%</div>
    </div>
    <div class="track">
      <div class="track-line"></div>
      <div class="track-dots" id="dots"></div>
    </div>
  </div>

  <div class="controls">
    <input type="text" id="search" placeholder="Search sprite...">
    <div class="pill active" data-rarity="all">All</div>
    <div class="pill" data-rarity="rare">Rare</div>
    <div class="pill" data-rarity="epic">Epic</div>
    <div class="pill" data-rarity="legendary">Legendary</div>
    <div class="pill" data-rarity="mythic">Mythic</div>
    <div class="pill" id="missingOnly">Missing Only</div>
    <div class="actions">
      <button class="iconbtn" id="exportBtn">Export</button>
      <button class="iconbtn" id="importBtn">Import</button>
      <button class="iconbtn" id="resetBtn">Reset</button>
    </div>
  </div>

  <div class="grid" id="grid"></div>

  <footer>UNOFFICIAL TRACKER · CUSTOM MADE · CH.7 TEMP.3</footer>
</div>

<script>
// Lista global de variantes ordenadas
const VARIANTS = ['normal', 'gold', 'gummy', 'galaxy', 'gem', 'holofoil', 'cube', 'quack'];
const VARIANT_LABEL = {
  normal: 'Normal', 
  gold: 'Gold', 
  gummy: 'Gummy', 
  galaxy: 'Galaxy', 
  cube: 'Cube', 
  quack: 'Quack', 
  gem: 'Gem', 
  holofoil: 'Holofoil'
};

// Variantes encriptadas / não lançadas nas linhas normais
const UNRELEASED_VARIANTS = ['gem', 'holofoil', 'cube', 'quack'];

// Sprites completos que ainda estão em hold / encriptados
const UNRELEASED_SPRITES = ['air', 'theseven', 'batman', 'johnwick'];

// Lista de Sprites Atualizada 100% em Inglês conforme Fortnite.gg
const SPRITES = [
  {id:'water',       name:'Water',            rarity:'rare',      ability:'Regenerates shield near water.'},
  {id:'earth',       name:'Earth',           rarity:'rare',      ability:'Chance for extra rare loot when opening chests.'},
  {id:'fire',        name:'Fire',            rarity:'rare',      ability:'Fire explosion upon dealing enough damage.'},
  {id:'fishy',       name:'Fishy',           rarity:'rare',      ability:'Increased swim and sprint speed.'},
  {id:'air',         name:'Air',             rarity:'rare',      ability:'Reduces fall damage and increases jump height.'},
  {id:'duck',        name:'Duck',            rarity:'epic',      ability:'Emotes or jamming regenerates shield.'},
  {id:'ghost',       name:'Ghost',           rarity:'epic',      ability:'Briefly turns invisible after reloading.'},
  {id:'king',        name:'King',            rarity:'epic',      ability:'More pickaxe damage.'},
  {id:'demon',       name:'Demon',           rarity:'epic',      ability:'Steals health upon eliminating an opponent.'},
  {id:'aura',        name:'Aura',            rarity:'epic',      ability:'Gains Shock Rock charge upon dealing damage.'},
  {id:'striker',     name:'Striker',         rarity:'epic',      ability:'Overdrive when climbing, vaulting or wall-running.'},
  {id:'theseven',    name:'The Seven',       rarity:'epic',      ability:'Reveals nearby chests and enemies when perfectly scanning.'},
  {id:'dream',       name:'Dream',           rarity:'legendary', ability:'Random item per level, legendary at max level.'},
  {id:'punk',        name:'Punk',            rarity:'legendary', ability:'Mysterious effect... could be nothing or everything.'},
  {id:'boss',        name:'Boss',            rarity:'legendary', ability:'Increases maximum health and shield.'},
  {id:'johnwick',    name:'John Wick',       rarity:'legendary', ability:'Instantly reloads weapons on weapon eliminations.', variants:['normal']},
  {id:'batman',      name:'Batman',          rarity:'legendary', ability:'Gears cooldowns are significantly reduced.'},
  {id:'burntpeanut', name:'Burnt Peanut',    rarity:'mythic',    ability:'Chance for more loot (sometimes mythic) upon elimination.', variants:['normal']},
  {id:'zeropoint',   name:'Zero Point',      rarity:'mythic',    ability:'Creates a mini shield bubble when healing.'},
  {id:'grim',        name:'Grim',            rarity:'mythic',    ability:'Marks whoever attacks you for a few seconds.'},
];

const RARITY_LABEL = {rare:'Rare', epic:'Epic', legendary:'Legendary', mythic:'Mythic'};
const STORAGE_KEY = 'spriteLockerCollectionV3';

let state = loadState();
let filter = {rarity:'all', search:'', missingOnly:false};

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  }catch(e){ return {}; }
}
function saveState(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function key(spriteId, variant){ return spriteId + ':' + variant; }
function levelKey(spriteId, variant){ return spriteId + ':' + variant + ':_level'; }
function masterKey(spriteId, variant){ return spriteId + ':' + variant + ':_mastered'; }

function totalSlots(){
  return SPRITES.reduce((acc,s)=> acc + (s.variants || VARIANTS).length, 0);
}
function collectedSlots(){
  return Object.keys(state).filter(k => !k.includes(':_') && state[k]).length;
}

function buildDots(){
  const dots = document.getElementById('dots');
  const total = totalSlots();
  dots.innerHTML = '';
  for(let i=0;i<total;i++){
    const d = document.createElement('div');
    d.className = 'dot';
    dots.appendChild(d);
  }
}
function renderProgress(){
  const total = totalSlots();
  const got = collectedSlots();
  document.getElementById('countText').innerHTML = got + '<span> / ' + total + '</span>';
  document.getElementById('pctText').textContent = Math.round((got/total)*100) + '%';
  document.getElementById('totalMeta').textContent = total;
  const dots = document.querySelectorAll('.dot');
  dots.forEach((d,i)=> d.classList.toggle('filled', i < got));
}

function spriteCollectedCount(sprite){
  const vs = sprite.variants || VARIANTS;
  return vs.filter(v => state[key(sprite.id,v)]).length;
}

function renderGrid(){
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  
  SPRITES.forEach(sprite=>{
    const vs = sprite.variants || VARIANTS;
    const got = spriteCollectedCount(sprite);
    const complete = got === vs.length;
    const matchesRarity = filter.rarity==='all' || sprite.rarity===filter.rarity;
    const matchesSearch = sprite.name.toLowerCase().includes(filter.search.toLowerCase());
    
    const card = document.createElement('div');
    card.className = 'card' + ((matchesRarity && matchesSearch) ? '' : ' hidden');

    const img = document.createElement('img');
    img.className = 'icon';
    img.src = `assets/${sprite.id}-normal.webp`;
    img.alt = sprite.name;
    img.dataset.stage = '0';
    img.onerror = function(){
      if(this.dataset.stage === '0'){
        this.dataset.stage = '1';
        this.src = `assets/temp-${sprite.id}-cube.webp`;
      } else {
        this.style.visibility = 'hidden';
      }
    };
    card.appendChild(img);

    const main = document.createElement('div');
    main.className = 'card-main';

    const top = document.createElement('div');
    top.className = 'card-top';
    top.innerHTML = `<div class="card-name">${sprite.name}</div><div class="rarity-tag ${sprite.rarity}">${RARITY_LABEL[sprite.rarity]}</div>`;
    main.appendChild(top);

    const ability = document.createElement('div');
    ability.className = 'ability';
    ability.textContent = sprite.ability;
    main.appendChild(ability);

    const variantsRow = document.createElement('div');
    variantsRow.className = 'variants';
    
    vs.forEach(v=>{
      const isCollected = !!state[key(sprite.id,v)];
      if(filter.missingOnly && isCollected) return; 
      
      const chip = document.createElement('div');
      
      // Verifica se a variante em si OU se o sprite inteiro está como unreleased
      const isUnreleased = UNRELEASED_VARIANTS.includes(v) || UNRELEASED_SPRITES.includes(sprite.id);
      
      chip.className = 'chip' + (isCollected ? ' on' : '') + (isUnreleased ? ' unreleased' : '');
      const badge = isUnreleased ? '<span class="chip-badge">Soon</span>' : '';
      
      const currentLevel = state[levelKey(sprite.id, v)] || '1';
      const isMastered = !!state[masterKey(sprite.id, v)];

      chip.innerHTML = `
        <img class="chip-thumb" src="assets/${sprite.id}-${v}.webp" onerror="if(this.dataset.s!=='1'){this.dataset.s='1';this.src='assets/temp-${sprite.id}-cube.webp';}else{this.style.visibility='hidden';}">
        <div>${VARIANT_LABEL[v]}</div>
        ${badge}
        <div class="chip-controls" onclick="event.stopPropagation()">
          <label>LVL:
            <select class="v-lvl" data-sprite="${sprite.id}" data-var="${v}">
              ${[1,2,3,4,5].map(l => `<option value="${l}" ${currentLevel == l ? 'selected' : ''}>${l}</option>`).join('')}
            </select>
          </label>
          <label>
            <span>Mastered</span>
            <input type="checkbox" class="v-mast" data-sprite="${sprite.id}" data-var="${v}" ${isMastered ? 'checked' : ''}>
          </label>
        </div>
      `;
      
      chip.addEventListener('click', () => {
        const k = key(sprite.id,v);
        state[k] = !state[k];
        saveState();
        renderGrid();
        renderProgress();
      });

      chip.querySelector('.v-lvl').addEventListener('change', (e) => {
        state[levelKey(sprite.id, v)] = e.target.value;
        saveState();
      });
      
      chip.querySelector('.v-mast').addEventListener('change', (e) => {
        state[masterKey(sprite.id, v)] = e.target.checked;
        saveState();
      });

      variantsRow.appendChild(chip);
    });
    
    main.appendChild(variantsRow);
    card.appendChild(main);

    if(complete){
      const stamp = document.createElement('div');
      stamp.className = 'stamp-overlay';
      stamp.textContent = 'Extracted';
      card.appendChild(stamp);
    }

    grid.appendChild(card);
  });
}

document.querySelectorAll('.pill[data-rarity]').forEach(pill=>{
  pill.addEventListener('click', ()=>{
    document.querySelectorAll('.pill[data-rarity]').forEach(p=>p.classList.remove('active'));
    pill.classList.add('active');
    filter.rarity = pill.dataset.rarity;
    renderGrid();
  });
});
document.getElementById('missingOnly').addEventListener('click', function(){
  filter.missingOnly = !filter.missingOnly;
  this.classList.toggle('active', filter.missingOnly);
  renderGrid();
});
document.getElementById('search').addEventListener('input', (e)=>{
  filter.search = e.target.value;
  renderGrid();
});
document.getElementById('resetBtn').addEventListener('click', ()=>{
  if(confirm('Reset all saved progress?')){
    state = {};
    saveState();
    renderGrid();
    renderProgress();
  }
});
document.getElementById('exportBtn').addEventListener('click', ()=>{
  const blob = new Blob([JSON.stringify(state,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'sprite-locker-backup.json';
  a.click();
  URL.revokeObjectURL(url);
});
document.getElementById('importBtn').addEventListener('click', ()=>{
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'application/json';
  input.addEventListener('change', (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ()=>{
      try{
        const imported = JSON.parse(reader.result);
        state = imported;
        saveState();
        renderGrid();
        renderProgress();
      }catch(err){
        alert('Invalid file format.');
      }
    };
    reader.readAsText(file);
  });
  input.click();
});

buildDots();
renderGrid();
renderProgress();
</script>
</body>
</html>
