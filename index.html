<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extraction Manifesto — Runners Season</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Stencil:wght@700;800&family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">
  <div class="manifest-head">
    <h1>Extraction Manifesto</h1>
    <p class="sub">Track every sprite and variant extracted — data stays stored on this device.</p>
    <div class="manifest-meta">
      <div>SEASON: <b>Runners</b></div>
      <div>UPDATED: <b>25 JUN 2026</b></div>
      <div>ENTRIES: <b id="totalMeta">—</b></div>
    </div>
  </div>

  <div class="track-card">
    <div class="track-top">
      <div class="track-counters">
        <div class="track-count" id="countText">0<span> / 0 Extracted</span></div>
        <div class="track-count mastered-count-color" id="masteredCountText">0<span> / 0 Mastered</span></div>
      </div>
      <div class="track-pct" id="pctText">0%</div>
    </div>
    <div class="track">
      <div class="track-fill" id="trackFill"></div>
    </div>
  </div>

  <div class="controls">
    <input type="text" id="search" placeholder="Search sprite...">
    <div class="pill active" data-rarity="all">All</div>
    <div class="pill" data-rarity="rare">Rare</div>
    <div class="pill" data-rarity="epic">Epic</div>
    <div class="pill" data-rarity="legendary">Legendary</div>
    <div class="pill" data-rarity="mythic">Mythic</div>
    <div class="pill" id="missingOnly">Missing Only</div>
    <div class="actions">
      <button class="iconbtn" id="exportBtn">Export</button>
      <button class="iconbtn" id="importBtn">Import</button>
      <button class="iconbtn" id="resetBtn">Reset</button>
    </div>
  </div>

  <div class="grid" id="grid"></div>

  <footer>UNOFFICIAL TRACKER · CUSTOM MADE · CH.7 TEMP.3</footer>
</div>

<script src="script.js"></script>
</body>
</html>
